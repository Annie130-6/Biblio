<style>
  :root {
    --bg: #F8F5F0;
    --surface: #FFFFFF;
    --border: #E8E0D4;
    --text: #1C1410;
    --muted: #9A8878;
    --accent: #B84A1C;
    --accent-light: #FEF0EB;
    --accent2: #2C5F3A;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
  
  /* Header */
  .header { background: var(--text); color: #F8F5F0; padding: 20px 20px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: #D4854A; }
  .stats { font-size: 11px; color: #9A8878; letter-spacing: 1px; margin-top: 2px; }
  .add-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
  
  /* Nav */
  .nav { display: flex; }
  .nav-btn { flex: 1; padding: 13px 6px; border: none; background: none; color: #9A8878; font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase; }
  .nav-btn.active { color: #D4854A; border-bottom-color: #D4854A; }

  /* Search */
  .section { padding: 20px 16px; }
  .search-bar { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 4px 14px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .search-bar input { flex: 1; border: none; background: transparent; font-family: 'Lato', sans-serif; font-size: 16px; padding: 11px 8px; outline: none; color: var(--text); }
  .search-bar input::placeholder { color: var(--muted); }
  .clear-btn { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; }
  
  /* Filter chips */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif; white-space: nowrap; letter-spacing: 0.3px; transition: all 0.15s; }
  .chip.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  
  /* Book filter */
  .book-filter { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; margin-bottom: 16px; appearance: none; }

  /* Result cards */
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; overflow: hidden; cursor: pointer; transition: transform 0.1s; }
  .result-card:active { transform: scale(0.98); }
  .result-stripe { width: 5px; flex-shrink: 0; }
  .result-body { flex: 1; padding: 14px 14px 14px 12px; }
  .result-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .result-book { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .result-ingredients { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
  .result-page { text-align: right; padding: 14px 16px 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .result-page .num { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; color: var(--accent); line-height: 1; }
  .result-page .lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; margin-top: 3px; }

  /* Empty state */
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); line-height: 1.8; }
  .empty .icon { font-size: 48px; margin-bottom: 16px; }
  .empty strong { color: var(--text); }

  /* Book cards */
  .book-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow); }
  .book-header { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .book-spine { width: 48px; height: 60px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .book-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .book-author { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .book-isbn { font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .book-count { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: white; border-radius: 12px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
  .book-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn { border: none; background: none; cursor: pointer; font-size: 18px; padding: 4px; color: var(--muted); }

  /* Recipe rows */
  .recipe-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); }
  .recipe-name { font-size: 14px; flex: 1; padding-right: 8px; }
  .recipe-sub { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 2px; }
  .recipe-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .page-badge { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-light); padding: 3px 10px; border-radius: 20px; }
  .del-btn { border: none; background: none; cursor: pointer; color: #ccc; font-size: 18px; padding: 0 2px; line-height: 1; }
  .del-btn:hover { color: #e74c3c; }
  .show-more { width: 100%; padding: 11px; background: var(--bg); border: none; border-top: 1px solid var(--border); color: var(--muted); font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Add recipe form */
  .add-recipe-form { padding: 16px; border-top: 1px solid var(--border); background: var(--bg); }
  .add-recipe-form .form-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 9px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; margin-bottom: 10px; }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 8px; }
  .form-row .form-input { flex: 1; margin-bottom: 0; }
  .form-row select.form-input { flex: 2; }
  .form-row-btns { display: flex; gap: 8px; margin-top: 10px; }
  .btn-primary { flex: 1; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-ghost { padding: 12px 16px; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Lato', sans-serif; font-size: 14px; cursor: pointer; }
  .add-recipe-btn { width: 100%; padding: 12px; background: var(--accent-light); border: none; border-top: 1px solid var(--border); color: var(--accent); font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }

  /* Add book form */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .form-card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .color-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border 0.1s; }
  .color-dot.selected { border-color: var(--text); }
  .info-box { background: var(--accent-light); border: 1px solid rgba(184,74,28,0.2); border-radius: 12px; padding: 16px; }
  .info-box-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .info-box p { font-size: 13px; color: var(--text); line-height: 1.7; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* Notif */
  .notif { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 999; box-shadow: 0 4px 24px rgba(0,0,0,0.25); white-space: nowrap; max-width: 90vw; animation: slideUp 0.3s ease; }
  .notif.err { background: #8B2020; }
  @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

  /* Result count */
  .result-count { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
</style>

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  tab: 'search',
  books: [],
  query: '',
  filterCat: '',
  filterBook: '',
  expandedBooks: new Set(),
  addingToBook: null,
  editingRecipe: null,
  showAddBook: false,
  newBook: {title:'', authors:'', isbn:'', color:'#B84A1C'},
  newRecipe: {name:'', page:'', ingredients:'', category:''},
  notif: null,
  nextId: 1000,
};

// ── Storage ───────────────────────────────────────────────────────────────────
function saveData() {
  try { localStorage.setItem('bibliotheque-v2', JSON.stringify({books: state.books, nextId: state.nextId})); } catch(e) {}
}
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem('bibliotheque-v2'));
    if (d && d.books && d.books.length > 0) {
      state.books = d.books;
      state.nextId = d.nextId || 1000;
      return;
    }
  } catch(e) {}
  state.books = JSON.parse(JSON.stringify(DEFAULT_BOOKS));
  state.nextId = 2000;
  saveData();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showNotif(msg, type='ok') {
  state.notif = {msg, type};
  render();
  setTimeout(() => { state.notif = null; render(); }, 2800);
}

function uid() { return ++state.nextId; }

function totalRecipes() { return state.books.reduce((s,b) => s + b.recipes.length, 0); }

function getResults() {
  const q = state.query.toLowerCase().trim();
  if (!q && !state.filterCat && !state.filterBook) return [];
  return state.books.flatMap(book => {
    if (state.filterBook && book.id !== parseInt(state.filterBook)) return [];
    return book.recipes
      .filter(r => {
        const mq = !q || r.name.toLowerCase().includes(q) || (r.ingredients||'').toLowerCase().includes(q);
        const mc = !state.filterCat || r.category === state.filterCat;
        return mq && mc;
      })
      .map(r => ({book, recipe:r}));
  });
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addBook() {
  if (!state.newBook.title.trim()) { showNotif('Entre le titre du livre', 'err'); return; }
  const book = {id: uid(), title: state.newBook.title.trim(), authors: state.newBook.authors.trim(), isbn: state.newBook.isbn.trim(), color: state.newBook.color, recipes: []};
  state.books.push(book);
  state.newBook = {title:'', authors:'', isbn:'', color:'#B84A1C'};
  state.showAddBook = false;
  state.tab = 'library';
  saveData();
  showNotif('📚 Livre ajouté !');
}

function deleteBook(id) {
  if (!confirm('Supprimer ce livre et toutes ses recettes ?')) return;
  state.books = state.books.filter(b => b.id !== id);
  saveData();
  showNotif('Livre supprimé', 'err');
  render();
}

function addRecipe(bookId) {
  if (!state.newRecipe.name.trim() || !state.newRecipe.page) { showNotif('Titre et page requis', 'err'); return; }
  const recipe = {id: uid(), name: state.newRecipe.name.trim(), page: parseInt(state.newRecipe.page), ingredients: state.newRecipe.ingredients.trim(), category: state.newRecipe.category};
  const book = state.books.find(b => b.id === bookId);
  book.recipes.push(recipe);
  book.recipes.sort((a,b) => a.page - b.page);
  state.newRecipe = {name:'', page:'', ingredients:'', category:''};
  state.addingToBook = null;
  saveData();
  showNotif('✅ Recette ajoutée !');
}

function deleteRecipe(bookId, recipeId) {
  const book = state.books.find(b => b.id === bookId);
  book.recipes = book.recipes.filter(r => r.id !== recipeId);
  saveData();
  showNotif('Recette supprimée', 'err');
  render();
}

function saveEdit() {
  const {bookId, recipe} = state.editingRecipe;
  const book = state.books.find(b => b.id === bookId);
  const idx = book.recipes.findIndex(r => r.id === recipe.id);
  book.recipes[idx] = {...recipe, page: parseInt(recipe.page)};
  book.recipes.sort((a,b) => a.page - b.page);
  state.editingRecipe = null;
  saveData();
  showNotif('✅ Recette modifiée !');
}

// ── Tag ───────────────────────────────────────────────────────────────────────
function tagHTML(cat, small) {
  const c = CAT_COLORS[cat] || '#888';
  const sz = small ? '10px' : '11px';
  return `<span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44;font-size:${sz}">${cat}</span>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const results = getResults();
  const app = document.getElementById('app');

  app.innerHTML = `
  ${state.notif ? `<div class="notif${state.notif.type==='err'?' err':''}">${state.notif.msg}</div>` : ''}

  ${state.editingRecipe ? renderModal() : ''}

  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo">Ma <span>Bibliothèque</span></div>
        <div class="stats">${state.books.length} livre${state.books.length!==1?'s':''} · ${totalRecipes()} recette${totalRecipes()!==1?'s':''}</div>
      </div>
      <button class="add-btn" onclick="state.tab='add';render()">+ Ajouter</button>
    </div>
    <div class="nav">
      <button class="nav-btn${state.tab==='search'?' active':''}" onclick="state.tab='search';render()">🔍 Rechercher</button>
      <button class="nav-btn${state.tab==='library'?' active':''}" onclick="state.tab='library';render()">📚 Livres</button>
      <button class="nav-btn${state.tab==='add'?' active':''}" onclick="state.tab='add';render()">＋ Nouveau</button>
    </div>
  </div>

  ${state.tab==='search' ? renderSearch(results) : ''}
  ${state.tab==='library' ? renderLibrary() : ''}
  ${state.tab==='add' ? renderAdd() : ''}
  `;

  // Re-bind events after render
  bindEvents();
}

function renderSearch(results) {
  const booksWithRecipes = state.books.filter(b => b.recipes.length > 0);
  return `
  <div class="section">
    <div class="search-bar">
      <span style="font-size:18px;color:var(--muted)">🔍</span>
      <input id="search-input" type="search" placeholder="Recette ou ingrédient…" value="${escHtml(state.query)}" oninput="state.query=this.value;renderSearch2()">
      ${state.query ? `<button class="clear-btn" onclick="state.query='';render()">✕</button>` : ''}
    </div>

    <div class="filter-row">
      <button class="chip${!state.filterCat && !state.filterBook?' active':''}" onclick="state.filterCat='';state.filterBook='';render()">Tout</button>
      ${CATS.map(c => `<button class="chip${state.filterCat===c?' active':''}" onclick="state.filterCat=state.filterCat==='${c}'?'':'${c}';render()">${c}</button>`).join('')}
    </div>

    ${booksWithRecipes.length > 1 ? `
    <select class="book-filter" onchange="state.filterBook=this.value;render()">
      <option value="">Tous les livres</option>
      ${state.books.map(b => `<option value="${b.id}"${state.filterBook==b.id?' selected':''}>${escHtml(b.title)}</option>`).join('')}
    </select>` : ''}

    ${(state.query || state.filterCat || state.filterBook) ? `
      ${results.length > 0 ? `<div class="result-count">${results.length} résultat${results.length>1?'s':''}</div>` : ''}
      ${results.length === 0 ? `<div class="empty"><div class="icon">🔎</div>Aucune recette trouvée pour<br><strong>« ${escHtml(state.query || state.filterCat)} »</strong></div>` : ''}
      ${results.map(r => `
        <div class="result-card" onclick="state.editingRecipe={bookId:${r.book.id},recipe:{...${JSON.stringify(r.recipe)}}};render()">
          <div class="result-stripe" style="background:${r.book.color}"></div>
          <div class="result-body">
            <div class="result-name">${escHtml(r.recipe.name)}</div>
            <div class="result-book">📚 ${escHtml(r.book.title)}</div>
            ${r.recipe.ingredients ? `<div class="result-ingredients">🧄 ${escHtml(r.recipe.ingredients)}</div>` : ''}
            ${r.recipe.category ? tagHTML(r.recipe.category, true) : ''}
          </div>
          <div class="result-page">
            <div class="num">${r.recipe.page}</div>
            <div class="lbl">page</div>
          </div>
        </div>`).join('')}
    ` : `
      <div class="empty">
        <div class="icon">📖</div>
        <div>Tape le nom d'une recette<br>ou d'un ingrédient pour le retrouver<br>instantanément dans tes livres.</div>
        <div style="margin-top:16px;font-size:13px">${totalRecipes()} recettes dans ${state.books.length} livre${state.books.length!==1?'s':''}.</div>
      </div>`}
  </div>`;
}

function renderSearch2() {
  // Fast re-render just the results
  render();
  // Re-focus the input
  const inp = document.getElementById('search-input');
  if (inp) { inp.focus(); const len = inp.value.length; inp.setSelectionRange(len, len); }
}

function renderLibrary() {
  if (state.books.length === 0) return `<div class="section"><div class="empty"><div class="icon">📚</div>Aucun livre encore.<br>Appuie sur <strong>+ Ajouter</strong> pour commencer !</div></div>`;
  return `<div class="section">${state.books.map(book => renderBookCard(book)).join('')}</div>`;
}

function renderBookCard(book) {
  const expanded = state.expandedBooks.has(book.id);
  const shown = expanded ? book.recipes : book.recipes.slice(0, 5);
  const isAdding = state.addingToBook === book.id;
  return `
  <div class="book-card">
    <div class="book-header" style="border-left:5px solid ${book.color}">
      <div class="book-spine" style="background:${book.color}22">${getBookEmoji(book.color)}</div>
      <div style="flex:1">
        <div class="book-title">${escHtml(book.title)}</div>
        ${book.authors ? `<div class="book-author">${escHtml(book.authors)}</div>` : ''}
        ${book.isbn ? `<div class="book-isbn">ISBN ${escHtml(book.isbn)}</div>` : ''}
        <span class="book-count">${book.recipes.length} recette${book.recipes.length!==1?'s':''}</span>
      </div>
      <div class="book-actions">
        <button class="icon-btn" onclick="deleteBook(${book.id})" title="Supprimer">🗑️</button>
      </div>
    </div>
    ${shown.map((r,i) => `
      <div class="recipe-row">
        <div style="flex:1">
          <div class="recipe-name">${escHtml(r.name)}</div>
          ${r.ingredients ? `<div class="recipe-sub">${escHtml(r.ingredients)}</div>` : ''}
          ${r.category ? tagHTML(r.category, true) : ''}
        </div>
        <div class="recipe-right">
          <span class="page-badge">p.${r.page}</span>
          <button class="icon-btn" style="font-size:14px" onclick="state.editingRecipe={bookId:${book.id},recipe:JSON.parse('${escJS(JSON.stringify(r))}')};render()">✏️</button>
          <button class="del-btn" onclick="deleteRecipe(${book.id},${r.id})">×</button>
        </div>
      </div>`).join('')}
    ${book.recipes.length > 5 ? `<button class="show-more" onclick="toggleExpand(${book.id})">${expanded?'▲ RÉDUIRE':'▼ VOIR '+( book.recipes.length-5)+' AUTRES'}</button>` : ''}
    ${isAdding ? `
      <div class="add-recipe-form">
        <div class="form-title">Ajouter une recette</div>
        <input class="form-input" id="nr-name-${book.id}" placeholder="Titre de la recette *" value="${escHtml(state.newRecipe.name)}" oninput="state.newRecipe.name=this.value">
        <div class="form-row">
          <input class="form-input" id="nr-page-${book.id}" type="number" placeholder="Page *" value="${state.newRecipe.page}" oninput="state.newRecipe.page=this.value" style="width:90px;flex:none">
          <select class="form-input" onchange="state.newRecipe.category=this.value">
            <option value="">Catégorie</option>
            ${CATS.map(c => `<option value="${c}"${state.newRecipe.category===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <input class="form-input" placeholder="Ingrédients principaux (optionnel)" value="${escHtml(state.newRecipe.ingredients)}" oninput="state.newRecipe.ingredients=this.value">
        <div class="form-row-btns">
          <button class="btn-primary" onclick="addRecipe(${book.id})">Ajouter</button>
          <button class="btn-ghost" onclick="state.addingToBook=null;state.newRecipe={name:'',page:'',ingredients:'',category:''};render()">✕</button>
        </div>
      </div>` : `<button class="add-recipe-btn" onclick="state.addingToBook=${book.id};state.expandedBooks.add(${book.id});render()">+ Ajouter une recette</button>`}
  </div>`;
}

function renderAdd() {
  return `
  <div class="section">
    <div class="form-card">
      <div class="form-card-title">📚 Nouveau livre de recettes</div>
      <label class="form-label">Titre du livre *</label>
      <input class="form-input" placeholder="ex: Cuisine du Québec" value="${escHtml(state.newBook.title)}" oninput="state.newBook.title=this.value">
      <label class="form-label">Auteur(e)</label>
      <input class="form-input" placeholder="ex: Jehane Benoît" value="${escHtml(state.newBook.authors)}" oninput="state.newBook.authors=this.value">
      <label class="form-label">ISBN (optionnel)</label>
      <input class="form-input" placeholder="ex: 9782897055868" value="${escHtml(state.newBook.isbn)}" oninput="state.newBook.isbn=this.value">
      <label class="form-label">Couleur du livre</label>
      <div class="color-row">
        ${BOOK_COLORS.map(c => `<div class="color-dot${state.newBook.color===c?' selected':''}" style="background:${c}" onclick="state.newBook.color='${c}';render()"></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="addBook()" style="margin-top:4px">Ajouter le livre</button>
    </div>
    <div class="info-box">
      <div class="info-box-title">💡 Comment ajouter tes recettes rapidement</div>
      <p>Après avoir créé un livre, va dans <strong>📚 Livres</strong> et appuie sur <strong>+ Ajouter une recette</strong>.<br><br>
      Tu peux aussi envoyer une photo de ta table des matières à Claude dans le chat — il lira les pages et ajoutera tout !</p>
    </div>
  </div>`;
}

function renderModal() {
  const {bookId, recipe} = state.editingRecipe;
  return `
  <div class="modal-overlay" onclick="if(event.target===this){state.editingRecipe=null;render()}">
    <div class="modal">
      <div class="modal-title">✏️ Modifier la recette</div>
      <label class="form-label">Titre</label>
      <input class="form-input" value="${escHtml(recipe.name)}" oninput="state.editingRecipe.recipe.name=this.value">
      <label class="form-label">Page</label>
      <input class="form-input" type="number" value="${recipe.page}" oninput="state.editingRecipe.recipe.page=this.value">
      <label class="form-label">Ingrédients principaux</label>
      <input class="form-input" placeholder="ex: poulet, ail, tomates" value="${escHtml(recipe.ingredients||'')}" oninput="state.editingRecipe.recipe.ingredients=this.value">
      <label class="form-label">Catégorie</label>
      <select class="form-input" onchange="state.editingRecipe.recipe.category=this.value">
        <option value="">— Aucune —</option>
        ${CATS.map(c => `<option value="${c}"${recipe.category===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="saveEdit()" style="margin-top:8px">Sauvegarder</button>
      <button class="btn-ghost" onclick="state.editingRecipe=null;render()" style="width:100%;margin-top:8px">Annuler</button>
    </div>
  </div>`;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJS(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function getBookEmoji(color) {
  const map = {'#A0784A':'🍞','#1A3A1A':'🥩','#B84A1C':'📕','#4A6FA5':'📘','#6B4FA0':'📓','#C45C8A':'📓','#2C5F3A':'🌿'};
  return map[color] || '📖';
}
function toggleExpand(id) {
  if (state.expandedBooks.has(id)) state.expandedBooks.delete(id);
  else state.expandedBooks.add(id);
  render();
}
function bindEvents() {
  // Search input focus preserved by renderSearch2
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
